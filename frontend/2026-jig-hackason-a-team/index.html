<!doctype html>
<html class="light" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://gongitsune.github.io/2026-jig-hackason-a-team/favicon.ico"
    />
    <link href="style/global.css" rel="stylesheet" />
    <link href="style/index.css" rel="stylesheet" />
    <script src="src/index.js" defer type="module"></script>
    <script src="src/pooling.js" defer type="module"></script>
    <script src="src/bg-3d.js" defer type="module"></script>
    <script src="src/components.js" defer type="module"></script>

    <title>ICHIBUN GRAND PRIX</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">ICHIBUN GRAND PRIX</h1>

      <form class="join-form card" id="join-form">
        <label for="username-input">ユーザー名</label>
        <input
          id="username-input"
          name="username"
          placeholder="ユーザー名を入力してください"
          required
          type="text"
        />

        <label for="room-id-input">合言葉</label>
        <input
          id="room-id-input"
          name="passphrase"
          placeholder="合言葉を入力してください"
          required
          type="text"
        />

        <p class="error-message" id="error-message" hidden></p>
        <button id="join-button" class="submit-button" type="submit">
          参加
        </button>
      </form>

      <p class="screenshots-desc">ギャラリー</p>
      <div class="screenshots">
        <img class="top" src="./imgs/index.png" alt="トップページ画像" />
        <img class="start" src="./imgs/start2.png" alt="スタートページ画像" />
        <img class="word" src="./imgs/word.png" alt="単語入力画面画像" />
        <img
          class="sentence"
          src="./imgs/sentence.png"
          alt="文章入力画面画像"
        />
      </div>
    </div>
  </body>
</html>
