<!doctype html>
<html class="light" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link href="style/global.css" rel="stylesheet" />
    <link href="style/start.css" rel="stylesheet" />
    <script src="src/start.js" defer type="module"></script>
    <script src="src/pooling.js" defer type="module"></script>
    <title>ICHIBUN GRAND PRIX - 結果</title>
  </head>
  <body>
    <div class="container">
      <div class="back-container">
        <button type="button" id="back-button">最初に戻る</button>
      </div>
      <div class="member-list">
        <section class="card">
          <div class="section-header">
            <span class="material-symbols-outlined">people</span>
            <h2 class="section-title">参加者</h2>
          </div>
          <ul class="member-list-items" id="member-list-items"></ul>
        </section>
      </div>

      <div class="button-area">
        <button class="submit-button" type="button" id="start-button">
          ゲームスタート
        </button>
      </div>

      <!-- Before result（過去結果があるときのみ表示） -->
      <div class="before-result card" id="before-result" hidden>
        <!-- 前回投票結果を表示するため、結果がなければ空にする -->
        <!-- Target Goal -->
        <section>
          <div class="section-header">
            <span class="material-symbols-outlined">thumb_up</span>
            <h2 class="section-title">前回投票結果</h2>
          </div>
          <p class="card-large-text" id="target-goal">一番食べたくない食べ物</p>
        </section>

        <ul class="result-sentences" id="result-sentences"></ul>
      </div>
    </div>
  </body>
</html>
