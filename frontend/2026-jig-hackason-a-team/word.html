<!doctype html>
<html lang="ja">
  <head>
    <title>ICHIBUN GRAND PRIX - 単語入力</title>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/global.css" />
    <link rel="stylesheet" href="style/word.css" />
    <script src="src/word.js" defer type="module"></script>
    <script src="src/pooling.js" defer type="module"></script>
    <script src="src/bg-3d.js" defer type="module"></script>
    <script src="src/components.js" defer type="module"></script>
  </head>
  <body>
    <div class="container">
      <!-- Target Goal -->
      <section class="card">
        <div class="section-header">
          <span class="material-symbols-outlined">target</span>
          <h2 class="section-title">目標</h2>
        </div>
        <p class="card-large-text" id="target">一番食べたくない食べ物</p>
      </section>

      <form id="word-form" class="word-form">
        <div class="writing-container">
          <div class="textarea-wrapper">
            <div class="textarea-toolbar">
              <label class="textarea-toolbar-title" for="word-input">
                あなたのセンスで単語を追加してください
              </label>
            </div>
            <input
              required
              class="story-textarea"
              name="word-input"
              id="word-input"
              placeholder="ここに単語を入力してください..."
            />
          </div>
        </div>

        <div class="textarea-footer">
          <button type="submit" class="submit-button" id="submit-button">
            送信
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
