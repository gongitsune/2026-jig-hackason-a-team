<!doctype html>
<html class="light" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link href="style/global.css" rel="stylesheet" />
    <link href="style/vote.css" rel="stylesheet" />
    <script src="src/vote.js" defer type="module"></script>
    <title>突発単語ゲーム - 投票</title>
  </head>
  <body>
    <div class="container">
      <!-- Target Goal -->
      <section class="card">
        <div class="section-header">
          <span class="material-symbols-outlined">thumb_up</span>
          <h2 class="section-title">投票</h2>
        </div>
        <p class="card-large-text">一番食べたくない食べ物</p>
      </section>

      <!-- Sentences -->
      <form id="vote-form">
        <fieldset>
          <legend class="description">
            一番目標と近いと思うものを選んでください。
          </legend>

          <div class="sentence-container" id="sentence-container"></div>

          <div class="submit-area">
            <button class="submit-button" type="submit">投票</button>
          </div>
        </fieldset>
      </form>
    </div>
  </body>
</html>
