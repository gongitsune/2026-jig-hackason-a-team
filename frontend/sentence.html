<!doctype html>
<html class="light" lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link href="style/sentence.css" rel="stylesheet" />
    <script src="src/sentence.js" defer type="module"></script>
    <title>突発単語ゲーム - 文書作成</title>
  </head>
  <body>
    <div class="container">
      <div class="game-area">
        <!-- Target Goal -->
        <section class="card">
          <div class="section-header">
            <span class="material-symbols-outlined">target</span>
            <h2 class="section-title">目標</h2>
          </div>
          <p class="mission-text">一番食べたくない食べ物</p>
        </section>

        <!-- Word Bank -->
        <section>
          <div class="word-bank-header">
            <div class="word-bank-header-left">
              <span class="material-symbols-outlined">inventory_2</span>
              <h3 class="section-title" id="word-section-title">単語リスト</h3>
            </div>
            <span class="word-bank-hint">単語をクリックして挿入</span>
          </div>
          <div class="word-buttons" id="word-container"></div>
        </section>

        <!-- Writing Area -->
        <section class="writing-container">
          <div class="textarea-wrapper">
            <div class="textarea-toolbar">
              <span class="textarea-toolbar-title">文書を書こう</span>
            </div>
            <textarea
              class="story-textarea"
              id="story-textarea"
              placeholder="ここに文書を入力してください..."
            ></textarea>
            <div class="textarea-footer">
              <span class="character-count" id="char-counter">8 / 20 文字</span>
            </div>
          </div>
        </section>

        <!-- Submit Area -->
        <div class="submit-area">
          <button type="button" class="submit-button" id="submit-button">
            提出
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
